# docker-compose.yml
services:
  web:
    image: mcsmanager-web:latest
    ports:
      - "23333:23333"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /root/work/MCSM/web/data:/opt/mcsmanager/web/data
      - /root/work/MCSM/web/logs:/opt/mcsmanager/web/logs

  daemon:
    image: mcsmanager-daemon:latest
    restart: unless-stopped
    network_mode: host # if you want run instance in daemon container
    # ports:
    #   - "24444:24444"
    environment:
      - MCSM_DOCKER_WORKSPACE_PATH=/root/work/MCSM/daemon/data/InstanceData
      # Rootless Docker (Linux): set DOCKER_HOST to your user socket path
      # - DOCKER_HOST=unix:///run/user/1000/docker.sock
    volumes:

      - /etc/localtime:/etc/localtime:ro
      - /root/work/MCSM/daemon/data:/opt/mcsmanager/daemon/data
      - /root/work/MCSM/daemon/logs:/opt/mcsmanager/daemon/logs
      # Rootful Docker (default):
      - /var/run/docker.sock:/var/run/docker.sock
      # Rootless Docker (Linux): replace the line above with:
      # - /run/user/1000/docker.sock:/run/user/1000/docker.sock
